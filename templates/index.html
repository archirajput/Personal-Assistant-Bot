<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archie-Your Personal Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 700px;
            height: 85vh;
            background: #1a1a2e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
        }
        .header {
            padding: 20px;
            background: #16213e;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #818cf8;
            letter-spacing: 1px;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        .user {
            background: #6366f1;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: #2d2d44;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex;
            padding: 16px;
            gap: 10px;
            background: #16213e;
        }
        input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: #2d2d44;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: #6366f1;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🤖 Archie - Your Personal Assistant</div>
        <div class="chat-box" id="chatBox">
            <div class="message bot">Yo! I am Archie, your coolest personal assistant. How can I help you today? 😊</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)"/>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            addMessage(data.reply, "bot");
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = `message ${sender}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKey(event) {
            if (event.key === "Enter") sendMessage();
        }
    </script>
</body>
</html>1a
